name: Java CI/CD Pipeline

# 1. Trigger the pipeline on every push to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    # boot up cloud vm
    runs-on: ubuntu-latest

    steps:
    # pull code from repo
    - name: Checkout Code
      uses: actions/checkout@v4

    # java env setup
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # compile and test
    - name: Build and Test with Maven
      run: ./mvnw clean package